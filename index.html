<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>滅乱忍伝</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #08090d;
      color: #f4f0df;
      font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", Meiryo, system-ui, sans-serif;
    }

    body {
      display: grid;
      place-items: center;
    }

    .shell {
      width: min(100vw, 1704px, calc(100vh * 16 / 9));
      aspect-ratio: 16 / 9;
      position: relative;
      background: #10131f;
      box-shadow: 0 0 0 1px #303852, 0 28px 70px rgba(0, 0, 0, .55);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      background: #111827;
    }

    .touch {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .pad,
    .actions {
      position: absolute;
      bottom: 14px;
      display: none;
      gap: 8px;
      pointer-events: auto;
      opacity: .78;
    }

    .pad {
      left: 14px;
      grid-template-columns: 42px 42px 42px;
      grid-template-rows: 42px 42px;
    }

    .actions {
      right: 14px;
      grid-template-columns: 48px 48px;
      align-items: end;
    }

    button {
      border: 1px solid rgba(255, 255, 255, .24);
      background: rgba(10, 14, 24, .72);
      color: #f8f0d6;
      font: 700 14px/1 system-ui, sans-serif;
      border-radius: 8px;
      min-width: 42px;
      min-height: 42px;
      touch-action: none;
    }

    .up {
      grid-column: 2;
    }

    .left {
      grid-column: 1;
      grid-row: 2;
    }

    .right {
      grid-column: 3;
      grid-row: 2;
    }

    @media (hover: none) and (pointer: coarse) {
      .pad,
      .actions {
        display: grid;
      }
    }
  </style>
</head>
<body>
  <main class="shell" aria-label="滅乱忍伝 game">
    <canvas id="game" width="1704" height="960"></canvas>
    <div class="touch" aria-hidden="true">
      <div class="pad">
        <button class="up" data-key="jump">↑</button>
        <button class="left" data-key="left">←</button>
        <button class="right" data-key="right">→</button>
      </div>
      <div class="actions">
        <button data-key="attack">斬</button>
        <button data-key="throw">投</button>
      </div>
    </div>
  </main>

  <script>
    (() => {
      "use strict";

      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");
      ctx.imageSmoothingEnabled = false;
      ctx.setTransform(4, 0, 0, 4, 0, 0);

      const W = 426;
      const H = 240;
      const GRAVITY = 0.36;
      const LEVEL_W = 2420;
      const keys = Object.create(null);
      const pressed = Object.create(null);

      const solid = [
        { x: 0, y: 214, w: 520, h: 42 },
        { x: 620, y: 214, w: 280, h: 42 },
        { x: 1000, y: 214, w: 360, h: 42 },
        { x: 1450, y: 214, w: 790, h: 42 },
        { x: 154, y: 170, w: 88, h: 10 },
        { x: 318, y: 137, w: 92, h: 10 },
        { x: 700, y: 166, w: 78, h: 10 },
        { x: 838, y: 128, w: 76, h: 10 },
        { x: 1084, y: 168, w: 104, h: 10 },
        { x: 1250, y: 132, w: 88, h: 10 },
        { x: 1568, y: 170, w: 92, h: 10 },
        { x: 1740, y: 138, w: 82, h: 10 },
        { x: 1914, y: 178, w: 92, h: 10 },
        { x: 548, y: 98, w: 20, h: 116 },
        { x: 930, y: 102, w: 24, h: 112 },
        { x: 1406, y: 94, w: 24, h: 120 }
      ];

      const enemies = [
        makeEnemy(270, 191, 95),
        makeEnemy(746, 143, 70),
        makeEnemy(1140, 191, 130),
        makeEnemy(1602, 147, 82),
        makeEnemy(1820, 191, 120),
        makeEnemy(1980, 155, 80)
      ];

      const boss = makeBoss();

      const player = {
        x: 38,
        y: 180,
        w: 18,
        h: 34,
        vx: 0,
        vy: 0,
        dir: 1,
        hp: 6,
        inv: 0,
        grounded: false,
        onWall: 0,
        attack: 0,
        slash: 0,
        longSlash: 0,
        attackHold: 0,
        longAttackUsed: false,
        throwAnim: 0,
        throwCooldown: 0,
        score: 0,
        dead: false
      };

      const projectiles = [];
      const sparks = [];
      const audio = makeAudio();
      let camera = 0;
      let time = 0;
      let state = "title";

      function makeEnemy(x, y, range) {
        return { x, y, home: x, y0: y, w: 18, h: 23, range, vx: .6, hp: 2, hurt: 0, dead: false };
      }

      function makeBoss() {
        return {
          x: 2160,
          y: 166,
          w: 45,
          h: 48,
          vx: -.55,
          vy: 0,
          dir: -1,
          hp: 18,
          maxHp: 18,
          hurt: 0,
          attack: 0,
          cooldown: 80,
          dead: false,
          awake: false
        };
      }

      function rects(a, b) {
        return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
      }

      function hitSolid(r) {
        for (const s of solid) {
          if (rects(r, s)) return s;
        }
        return null;
      }

      function moveActor(a) {
        a.x += a.vx;
        let s = hitSolid(a);
        if (s) {
          if (a.vx > 0) a.x = s.x - a.w;
          if (a.vx < 0) a.x = s.x + s.w;
          a.vx = 0;
        }

        a.y += a.vy;
        a.grounded = false;
        s = hitSolid(a);
        if (s) {
          if (a.vy > 0) {
            a.y = s.y - a.h;
            a.grounded = true;
          } else if (a.vy < 0) {
            a.y = s.y + s.h;
          }
          a.vy = 0;
        }
      }

      function makeSpark(x, y, color) {
        for (let i = 0; i < 16; i++) {
          sparks.push({
            x,
            y,
            vx: (Math.random() - .5) * 3,
            vy: -Math.random() * 2,
            life: 18 + Math.random() * 10,
            color
          });
        }
      }

      function damagePlayer(fromX) {
        if (player.inv || player.dead) return;
        audio.play("hurt");
        player.hp--;
        player.inv = 58;
        player.vx = fromX < player.x ? 2.4 : -2.4;
        player.vy = -4;
        makeSpark(player.x + 8, player.y + 12, "#f45b5b");
        if (player.hp <= 0) {
          player.dead = true;
          state = "over";
          audio.stopBgm();
        }
      }

      function restart() {
        audio.start();
        audio.play("start");
        audio.startBgm();
        Object.assign(player, {
          x: 38,
          y: 180,
          vx: 0,
          vy: 0,
          dir: 1,
          hp: 6,
          inv: 0,
          grounded: false,
          onWall: 0,
          attack: 0,
          slash: 0,
          longSlash: 0,
          attackHold: 0,
          longAttackUsed: false,
          throwAnim: 0,
          throwCooldown: 0,
          score: 0,
          dead: false
        });
        enemies.splice(0, enemies.length,
          makeEnemy(270, 191, 95),
          makeEnemy(746, 143, 70),
          makeEnemy(1140, 191, 130),
          makeEnemy(1602, 147, 82),
          makeEnemy(1820, 191, 120),
          makeEnemy(1980, 155, 80)
        );
        Object.assign(boss, makeBoss());
        projectiles.length = 0;
        sparks.length = 0;
        camera = 0;
        state = "play";
      }

      function update() {
        time++;
        if (pressed.start && state !== "play") restart();
        if (state !== "play") {
          clearPressed();
          return;
        }

        const left = keys.left;
        const right = keys.right;
        const accel = player.grounded ? .62 : .34;
        const max = player.grounded ? 2.05 : 1.9;

        if (left) {
          player.vx -= accel;
          player.dir = -1;
        }
        if (right) {
          player.vx += accel;
          player.dir = 1;
        }
        if (!left && !right) player.vx *= player.grounded ? .72 : .92;
        player.vx = Math.max(-max, Math.min(max, player.vx));

        const wallRight = hitSolid({ x: player.x + player.w, y: player.y + 3, w: 2, h: player.h - 6 });
        const wallLeft = hitSolid({ x: player.x - 2, y: player.y + 3, w: 2, h: player.h - 6 });
        player.onWall = !player.grounded && player.vy > 0 && (wallRight ? 1 : wallLeft ? -1 : 0);

        if (pressed.jump) {
          if (player.grounded) {
            player.vy = -7.1;
            audio.play("jump");
          } else if (player.onWall) {
            player.vy = -6.5;
            player.vx = -player.onWall * 3.2;
            player.dir = -player.onWall;
            makeSpark(player.x + player.w / 2, player.y + 20, "#f7d86a");
            audio.play("jump");
          }
        }

        if (pressed.attack && player.attack <= 0) {
          player.attack = 16;
          player.slash = 10;
          player.longSlash = 0;
          audio.play("slash");
        }

        if (keys.attack) {
          player.attackHold++;
          if (player.attackHold >= 22 && !player.longAttackUsed) {
            player.attack = 24;
            player.slash = 14;
            player.longSlash = 14;
            player.longAttackUsed = true;
            makeSpark(player.x + player.w / 2, player.y + 18, "#f7f0b8");
            audio.play("slash");
          }
        } else {
          player.attackHold = 0;
          player.longAttackUsed = false;
        }

        if (pressed.throw && player.throwCooldown <= 0) {
          projectiles.push({
            x: player.x + (player.dir > 0 ? player.w : -7),
            y: player.y + 12,
            w: 8,
            h: 4,
            vx: player.dir * 4.2,
            vy: -1.15,
            spin: 0,
            life: 70
          });
          player.throwCooldown = 24;
          player.throwAnim = 14;
          audio.play("throw");
        }

        player.vy += player.onWall ? GRAVITY * .35 : GRAVITY;
        if (player.onWall && player.vy > 1.2) player.vy = 1.2;
        moveActor(player);
        player.x = Math.max(0, Math.min(LEVEL_W - player.w, player.x));
        if (player.y > H + 80) damagePlayer(player.x + 80);

        if (player.attack > 0) player.attack--;
        if (player.slash > 0) player.slash--;
        if (player.longSlash > 0) player.longSlash--;
        if (player.throwAnim > 0) player.throwAnim--;
        if (player.throwCooldown > 0) player.throwCooldown--;
        if (player.inv > 0) player.inv--;

        const slashReach = player.longSlash > 0 ? 2 : 1;
        const slashRect = {
          x: player.x + (player.dir > 0 ? 14 : -22 - 28 * (slashReach - 1)),
          y: player.y + 10,
          w: 28 * slashReach,
          h: 16
        };

        for (const e of enemies) {
          if (e.dead) continue;
          e.x += e.vx;
          if (Math.abs(e.x - e.home) > e.range) e.vx *= -1;
          if (e.hurt > 0) e.hurt--;
          if (player.slash === 8 && rects(slashRect, e)) {
            e.hp--;
            e.hurt = 16;
            e.vx = player.dir * 1.6;
            makeSpark(e.x + 9, e.y + 11, "#f7d86a");
            if (e.hp <= 0) {
              e.dead = true;
              player.score += 100;
              audio.play("kill");
            }
          }
          if (!e.dead && rects(player, e)) damagePlayer(e.x);
        }

        updateBoss(slashRect);

        for (const p of projectiles) {
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.085;
          p.spin += p.vx > 0 ? .45 : -.45;
          p.life--;
          if (hitSolid(p)) p.life = 0;
          for (const e of enemies) {
            if (!e.dead && p.life > 0 && rects(p, e)) {
              e.hp--;
              e.hurt = 16;
              p.life = 0;
              makeSpark(e.x + 9, e.y + 11, "#b9f2ff");
              if (e.hp <= 0) {
                e.dead = true;
                player.score += 100;
                audio.play("kill");
              }
            }
          }
          if (!boss.dead && p.life > 0 && rects(p, boss)) {
            boss.hp--;
            boss.hurt = 14;
            p.life = 0;
            makeSpark(boss.x + 22, boss.y + 22, "#b9f2ff");
            if (boss.hp <= 0) defeatBoss();
          }
        }

        for (let i = projectiles.length - 1; i >= 0; i--) {
          if (projectiles[i].life <= 0) projectiles.splice(i, 1);
        }

        for (const s of sparks) {
          s.x += s.vx;
          s.y += s.vy;
          s.vy += .16;
          s.life--;
        }
        for (let i = sparks.length - 1; i >= 0; i--) {
          if (sparks[i].life <= 0) sparks.splice(i, 1);
        }

        if (player.x > 2320 && boss.dead) {
          state = "clear";
          audio.stopBgm();
          audio.play("clear");
        }
        camera += (Math.max(0, Math.min(LEVEL_W - W, player.x - 150)) - camera) * .12;
        clearPressed();
      }

      function updateBoss(slashRect) {
        if (boss.dead) return;
        if (!boss.awake && player.x > 1960) {
          boss.awake = true;
          audio.play("boss");
        }
        if (!boss.awake) return;

        boss.dir = player.x < boss.x ? -1 : 1;
        boss.cooldown--;
        if (boss.cooldown <= 0) {
          boss.attack = 28;
          boss.cooldown = 78;
          boss.vx = boss.dir * 2.2;
          makeSpark(boss.x + 22, boss.y + 34, "#9d1f34");
        }

        if (boss.attack > 0) boss.attack--;
        if (boss.hurt > 0) boss.hurt--;
        boss.vx += boss.dir * .022;
        boss.vx *= .985;
        boss.vx = Math.max(-1.55, Math.min(1.55, boss.vx));
        boss.x += boss.vx;
        if (boss.x < 2072) {
          boss.x = 2072;
          boss.vx *= -.55;
        }
        if (boss.x > 2296) {
          boss.x = 2296;
          boss.vx *= -.55;
        }

        if (player.slash === 8 && rects(slashRect, boss)) {
          boss.hp--;
          boss.hurt = 16;
          boss.vx = player.dir * 1.1;
          makeSpark(boss.x + 22, boss.y + 24, "#f7d86a");
          if (boss.hp <= 0) defeatBoss();
        }

        const maul = {
          x: boss.x + (boss.dir > 0 ? 28 : -15),
          y: boss.y + 18,
          w: 32,
          h: 20
        };
        if (rects(player, boss) || (boss.attack > 12 && rects(player, maul))) {
          damagePlayer(boss.x + boss.w / 2);
        }
      }

      function defeatBoss() {
        boss.dead = true;
        player.score += 1000;
        audio.play("bossDown");
        makeSpark(boss.x + 22, boss.y + 24, "#f7d86a");
        makeSpark(boss.x + 18, boss.y + 34, "#b9f2ff");
      }

      function makeAudio() {
        let ac = null;
        let master = null;
        let bgmTimer = null;
        let step = 0;
        const melody = [220, 277, 330, 277, 247, 294, 370, 294, 196, 247, 294, 247, 220, 262, 330, 392];
        const bass = [110, 110, 98, 98, 123, 123, 82, 82];

        function start() {
          if (!ac) {
            ac = new (window.AudioContext || window.webkitAudioContext)();
            master = ac.createGain();
            master.gain.value = 0.18;
            master.connect(ac.destination);
          }
          if (ac.state === "suspended") ac.resume();
        }

        function tone(freq, dur, type, gainValue, bend) {
          if (!ac) return;
          const t = ac.currentTime;
          const osc = ac.createOscillator();
          const gain = ac.createGain();
          osc.type = type;
          osc.frequency.setValueAtTime(freq, t);
          if (bend) osc.frequency.exponentialRampToValueAtTime(Math.max(30, freq * bend), t + dur);
          gain.gain.setValueAtTime(0.0001, t);
          gain.gain.exponentialRampToValueAtTime(gainValue, t + 0.01);
          gain.gain.exponentialRampToValueAtTime(0.0001, t + dur);
          osc.connect(gain);
          gain.connect(master);
          osc.start(t);
          osc.stop(t + dur + 0.02);
        }

        function noise(dur, gainValue) {
          if (!ac) return;
          const size = Math.max(1, Math.floor(ac.sampleRate * dur));
          const buffer = ac.createBuffer(1, size, ac.sampleRate);
          const data = buffer.getChannelData(0);
          for (let i = 0; i < size; i++) data[i] = Math.random() * 2 - 1;
          const src = ac.createBufferSource();
          const filter = ac.createBiquadFilter();
          const gain = ac.createGain();
          filter.type = "highpass";
          filter.frequency.value = 1200;
          gain.gain.setValueAtTime(gainValue, ac.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + dur);
          src.buffer = buffer;
          src.connect(filter);
          filter.connect(gain);
          gain.connect(master);
          src.start();
          src.stop(ac.currentTime + dur);
        }

        function play(name) {
          if (!ac) return;
          if (name === "start") {
            tone(330, .08, "square", .12, 1.25);
            setTimeout(() => tone(440, .12, "square", .12, 1.2), 70);
          } else if (name === "jump") {
            tone(260, .13, "square", .11, 1.9);
          } else if (name === "slash") {
            noise(.08, .12);
            tone(740, .07, "sawtooth", .08, .55);
          } else if (name === "throw") {
            tone(980, .05, "square", .07, .72);
            tone(1320, .04, "triangle", .05, .75);
          } else if (name === "hurt") {
            noise(.18, .15);
            tone(180, .18, "sawtooth", .12, .55);
          } else if (name === "kill") {
            tone(620, .08, "square", .1, 1.4);
            setTimeout(() => tone(930, .09, "square", .08, 1.25), 55);
          } else if (name === "boss") {
            tone(92, .45, "sawtooth", .16, .65);
            setTimeout(() => noise(.2, .12), 120);
          } else if (name === "bossDown") {
            tone(330, .14, "square", .14, .7);
            setTimeout(() => tone(247, .18, "square", .13, .7), 90);
            setTimeout(() => tone(165, .28, "sawtooth", .13, .5), 210);
            setTimeout(() => noise(.35, .14), 180);
          } else if (name === "clear") {
            [392, 494, 587, 784].forEach((f, i) => setTimeout(() => tone(f, .14, "square", .11, 1), i * 95));
          }
        }

        function startBgm() {
          if (!ac || bgmTimer) return;
          step = 0;
          bgmTimer = setInterval(() => {
            if (!ac || ac.state !== "running") return;
            const lead = melody[step % melody.length];
            tone(lead, .1, "square", .035, 1);
            if (step % 2 === 0) tone(bass[(step / 2) % bass.length], .16, "triangle", .045, 1);
            if (step % 4 === 2) noise(.035, .035);
            step++;
          }, 145);
        }

        function stopBgm() {
          if (bgmTimer) {
            clearInterval(bgmTimer);
            bgmTimer = null;
          }
        }

        return { start, play, startBgm, stopBgm };
      }

      function drawRect(x, y, w, h, c) {
        ctx.fillStyle = c;
        ctx.fillRect(Math.round(x - camera), Math.round(y), Math.round(w), Math.round(h));
      }

      function drawFineRect(x, y, w, h, c) {
        ctx.fillStyle = c;
        ctx.fillRect(Math.round((x - camera) * 2) / 2, Math.round(y * 2) / 2, w, h);
      }

      function drawScreenFineRect(x, y, w, h, c) {
        ctx.fillStyle = c;
        ctx.fillRect(Math.round(x * 2) / 2, Math.round(y * 2) / 2, w, h);
      }

      function drawMicroRect(x, y, w, h, c) {
        ctx.fillStyle = c;
        ctx.fillRect(Math.round((x - camera) * 3) / 3, Math.round(y * 3) / 3, w, h);
      }

      function drawActorMicroRect(x, y, w, h, c) {
        ctx.fillStyle = c;
        ctx.fillRect(Math.round(x * 3) / 3, Math.round(y * 3) / 3, w, h);
      }

      function draw() {
        ctx.fillStyle = "#0a0e18";
        ctx.fillRect(0, 0, W, H);
        drawSky();
        drawLevel();
        drawForegroundRails();
        drawBossGate();

        for (const p of projectiles) {
          drawShuriken(p);
        }

        for (const e of enemies) drawEnemy(e);
        drawBoss();
        drawPlayer();

        for (const s of sparks) {
          drawFineRect(s.x, s.y, 1.25, 1.25, s.color);
        }

        drawHud();
        if (state === "title") overlay("滅乱忍伝", "Enter / Space で開始", "移動: ← →   跳躍: Z / Space   斬撃: X   手裏剣: C");
        if (state === "over") overlay("GAME OVER", "Enter / Space で再挑戦", "闇の砦はまだ遠い");
        if (state === "clear") overlay("討伐完了", "Enter / Space で再挑戦", "食人鬼ウォーディは月下に沈んだ");
      }

      function drawSky() {
        const g = ctx.createLinearGradient(0, 0, 0, H);
        g.addColorStop(0, "#11182a");
        g.addColorStop(.62, "#28314a");
        g.addColorStop(1, "#11131a");
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, W, H);
        const moonX = 338 - camera * .08;
        ctx.fillStyle = "#f8ecc2";
        ctx.fillRect(Math.round(moonX), 24, 23, 23);
        ctx.fillStyle = "#28314a";
        ctx.fillRect(Math.round(moonX + 9), 20, 19, 24);

        for (let i = 0; i < 140; i++) {
          const x = (i * 83 - camera * (.12 + (i % 4) * .05)) % (W + 50) - 25;
          const y = 16 + (i * 37) % 92;
          ctx.fillStyle = i % 5 ? "#75809d" : "#e6d79e";
          ctx.fillRect(Math.round(x * 2) / 2, y, i % 3 ? .5 : 1, i % 4 ? .5 : 1);
        }

        for (let layer = 0; layer < 3; layer++) {
          const par = .22 + layer * .16;
          const base = 164 - layer * 18;
          ctx.fillStyle = ["#111827", "#182037", "#202947"][layer];
          for (let x = -80; x < LEVEL_W; x += 88) {
            const sx = Math.round(x - camera * par);

            ctx.fillRect(sx + 18, base - 34 - ((x / 9) % 20), 28, 34);
            ctx.fillStyle = layer === 2 ? "#303958" : "#25304b";
            ctx.fillRect(sx + 9, base - 42, 7, 13);
            ctx.fillRect(sx + 39, base - 18, 7, 12);
            ctx.fillStyle = layer === 2 ? "#39466b" : "#2c3857";
            ctx.fillRect(sx + 10.5, base - 39.5, 1, 8);

      function drawBridgeSkyline() {
        const bridgeX = Math.round(244 - camera * .18);
        ctx.fillStyle = "#2a1830";
        ctx.fillRect(bridgeX + 82, 23, 210, 122);
        ctx.fillStyle = "#38213c";
        ctx.fillRect(bridgeX + 82, 23, 8, 122);
        ctx.fillStyle = "#111827";
        for (let i = 0; i < 13; i++) {
          const x = bridgeX + 90 + i * 15;
          ctx.fillRect(x, 33 + i % 3, 2, 102);
          ctx.fillStyle = i % 2 ? "#7b2e47" : "#1aa0a7";
          ctx.fillRect(x + 1, 34 + i % 3, 1, 96);
          ctx.fillStyle = "#111827";
        }
        ctx.strokeStyle = "#657386";
        ctx.lineWidth = .7;
        for (let i = 0; i < 10; i++) {
          ctx.beginPath();
          ctx.moveTo(bridgeX + 68 + i * 12, 147);
          ctx.lineTo(bridgeX + 142 + i * 7, 25);
          ctx.stroke();
        }

        const towers = [
          { x: 44, y: 63, w: 20, h: 97 },
          { x: 74, y: 50, w: 16, h: 110 },
          { x: 108, y: 78, w: 27, h: 82 },
          { x: 148, y: 58, w: 22, h: 102 },
          { x: 184, y: 88, w: 36, h: 72 },
          { x: 246, y: 70, w: 16, h: 90 },
          { x: 274, y: 80, w: 30, h: 80 },
          { x: 326, y: 72, w: 28, h: 88 }
        ];
        for (const b of towers) {
          const x = Math.round(b.x - camera * .32);
          ctx.fillStyle = "#201929";
          ctx.fillRect(x, b.y, b.w, b.h);
          ctx.fillStyle = "#46394b";
          ctx.fillRect(x + 1, b.y + 1, b.w - 2, 1);
          for (let yy = b.y + 7; yy < b.y + b.h - 4; yy += 6) {
            for (let xx = x + 3; xx < x + b.w - 3; xx += 6) {
              const lit = (xx + yy + time) % 5 !== 0;
              ctx.fillStyle = lit ? "#d3c5a0" : "#534056";
              ctx.fillRect(xx, yy, 2, 2);
              if (lit && (xx + yy) % 3 === 0) ctx.fillRect(xx + 2.5, yy, .5, 2);
            }
          }
          ctx.fillStyle = "#111018";
          ctx.fillRect(x - 2, b.y + b.h - 2, b.w + 4, 3);
        }
      }

      function drawShuriken(p) {
        const x = Math.round(p.x - camera + p.w / 2);
        const y = Math.round(p.y + p.h / 2);

          ctx.fillRect(x - 1, y - 6, 2, 13);
          ctx.fillRect(x - 6, y - 1, 13, 2);
          ctx.fillRect(x - 5.5, y - 5.5, 2, 2);
          ctx.fillRect(x + 3.5, y + 3.5, 2, 2);
        } else if (frame === 1) {
          ctx.fillRect(x - 5, y - 5, 3, 3);
          ctx.fillRect(x + 3, y - 5, 3, 3);
          ctx.fillRect(x - 5, y + 3, 3, 3);
          ctx.fillRect(x + 3, y + 3, 3, 3);
          ctx.fillRect(x - 1, y - 1, 3, 3);
          ctx.fillRect(x - 6.5, y, 2, .5);
          ctx.fillRect(x + 5, y, 2, .5);
        } else if (frame === 2) {
          ctx.fillRect(x - 2, y - 5, 4, 11);
          ctx.fillRect(x - 5, y - 2, 11, 4);
          ctx.fillRect(x - 4.5, y + 3.5, 2, 1);
          ctx.fillRect(x + 3, y - 4.5, 2, 1);
        } else {
          ctx.fillRect(x - 6, y - 3, 4, 4);
          ctx.fillRect(x + 2, y - 3, 4, 4);
          ctx.fillRect(x - 2, y + 1, 4, 4);
          ctx.fillStyle = "#6fb8c9";
          ctx.fillRect(x - 1, y, 2, 2);
          ctx.fillStyle = "#ffffff";
          ctx.fillRect(x - .5, y - .5, 1, 1);
          return;
        }
        ctx.fillStyle = "#6fb8c9";
        ctx.fillRect(x - 1, y - 1, 2, 2);
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(x - .5, y - .5, 1, 1);
      }

      function drawHud() {
        ctx.fillStyle = "rgba(4, 5, 8, .78)";
        ctx.fillRect(0, 0, W, 23);
        ctx.fillStyle = "#f4f0df";
        ctx.font = "10px monospace";
        ctx.fillText("滅乱忍伝", 9, 15);
        ctx.fillText(String(player.score).padStart(5, "0"), 82, 15);
        for (let i = 0; i < 6; i++) {
          ctx.fillStyle = i < player.hp ? "#d84848" : "#3b4150";
          ctx.fillRect(338 + i * 12, 8, 8, 8);
        }
        ctx.fillStyle = "#a7b4c8";
        ctx.fillText("16:9 1704x960", 172, 15);
        if (boss.awake && !boss.dead) {
          ctx.fillStyle = "#0b0d12";
          ctx.fillRect(126, 26, 174, 8);
          ctx.fillStyle = "#7c2636";
          ctx.fillRect(128, 28, Math.ceil(170 * boss.hp / boss.maxHp), 4);
          ctx.fillStyle = "#f4f0df";
          ctx.font = "8px monospace";
          ctx.fillText("食人鬼ウォーディ", 180, 24);
        }
      }

      function overlay(title, line, sub) {
        ctx.fillStyle = "rgba(4, 5, 10, .72)";
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = "#f4f0df";
        ctx.font = "24px monospace";
        ctx.textAlign = "center";
        ctx.fillText(title, W / 2, 88);
        ctx.font = "12px monospace";
        ctx.fillStyle = "#f7d86a";
        ctx.fillText(line, W / 2, 120);
        ctx.fillStyle = "#aeb8ca";
        ctx.fillText(sub, W / 2, 145);
        ctx.textAlign = "left";
      }

      function clearPressed() {
        for (const k in pressed) pressed[k] = false;
      }

      function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
      }

      const map = {
        ArrowLeft: "left",
        ArrowRight: "right",
        ArrowUp: "jump",
        KeyZ: "jump",
        Space: "jump",
        KeyX: "attack",
        KeyC: "throw",
        Enter: "start"
      };

      window.addEventListener("keydown", (e) => {
        const k = map[e.code];
        if (!k) return;
        audio.start();
        if (!keys[k]) pressed[k] = true;
        keys[k] = true;
        if (["ArrowLeft", "ArrowRight", "ArrowUp", "Space"].includes(e.code)) e.preventDefault();
        if (state !== "play" && (e.code === "Space" || e.code === "Enter")) pressed.start = true;
      });

      window.addEventListener("keyup", (e) => {
        const k = map[e.code];
        if (k) keys[k] = false;
      });

      for (const button of document.querySelectorAll("button[data-key]")) {
        const k = button.dataset.key;
        const down = (e) => {
          e.preventDefault();
          if (!keys[k]) pressed[k] = true;
          keys[k] = true;
          if (state !== "play") pressed.start = true;
        };
        const up = (e) => {
          e.preventDefault();
          keys[k] = false;
        };
        button.addEventListener("pointerdown", down);
        button.addEventListener("pointerup", up);
        button.addEventListener("pointercancel", up);
        button.addEventListener("pointerleave", up);
      }

      loop();
    })();
  </script>
</body>
</html>
